<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Defense - AI Expert</title>
    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #111827;
            color: #f3f4f6;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
        }

        .chat-container {
            height: 100vh;
            display: flex;
            background-color: #0d1117;
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.15); 
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1f2937;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #10b981;
            border-radius: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981; 
            border-radius: 50%;
            margin: 0 4px;
            opacity: 0;
            animation: pulse 1s infinite;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); box-shadow: 0 0 8px #10b981; } 
            100% { opacity: 0.3; transform: scale(1); }
        }
        
        .mic-active {
            animation: pulse-mic 1s infinite;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.8);
        }
        @keyframes pulse-mic {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Speaker icon styles */
        #mute-button svg {
            transition: all 0.2s ease;
        }
        .is-muted #speaker-path {
            opacity: 0.2;
        }
        .is-muted svg {
            color: #4b5563; /* Grayed out when muted */
        }
        #mute-button:not(.is-muted) svg {
            color: #10b981; /* Green when active */
            filter: drop-shadow(0 0 5px rgba(16, 185, 129, 0.5));
        }
    </style>
</head>
<body class="bg-gray-900">
    <div class="chat-container w-full mx-auto max-w-7xl">
        <!-- History Sidebar -->
        <div id="history-sidebar" class="w-64 flex-shrink-0 bg-gray-800 border-r border-green-800 flex flex-col p-4 space-y-4 custom-scrollbar">
            <h2 class="text-xl font-bold text-green-400 border-b border-green-800 pb-2">SESSION_HISTORY</h2>
            
            <button id="new-chat-button" class="w-full bg-green-600 hover:bg-green-700 text-black font-semibold py-2 px-4 rounded-lg transition shadow-lg flex items-center justify-center space-x-2 disabled:opacity-50">
                <span>+ New Chat</span>
            </button>
            
            <button id="delete-all-button" class="w-full bg-red-700 hover:bg-red-800 text-white font-semibold py-2 px-4 rounded-lg transition shadow-lg flex items-center justify-center space-x-2 disabled:opacity-50">
                <span>Delete All</span>
            </button>

            <p class="text-[10px] text-gray-500 truncate">UID: <span id="user-id-display">LOCAL_USER</span></p>

            <div id="history-list" class="flex-grow overflow-y-auto space-y-2 custom-scrollbar">
                <p id="loading-history" class="text-gray-500 text-sm italic">Cloud Storage Offline</p>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="flex-grow flex flex-col">
            <header class="text-center py-4 border-b border-green-800 px-6 flex-shrink-0">
                <h1 class="text-3xl font-extrabold text-green-400">CYBER_DEFENSE_v1.0</h1>
                <p class="text-xs text-gray-400 uppercase tracking-widest">Secure Neural Uplink Active</p>
            </header>

            <div id="chat-window" class="flex-grow overflow-y-auto pt-4 space-y-4 px-6 custom-scrollbar">
                <div class="flex justify-start">
                    <div class="bg-gray-800 text-green-400 p-3 rounded-xl rounded-tl-none max-w-[80%] border border-green-900/50">
                        <p class="font-bold text-green-200 uppercase">SYSTEM_READY</p>
                        <p class="mt-1 text-sm">Standalone Mode Active. Data will not be saved to cloud.</p>
                    </div>
                </div>
            </div>

            <div class="pt-4 border-t border-green-800 sticky bottom-0 bg-gray-900 px-6 pb-6 flex-shrink-0">
                <form id="chat-form" class="flex space-x-3">
                    <button type="button" id="mic-button" class="bg-gray-800 hover:bg-gray-700 text-green-400 p-3 rounded-lg border border-green-600">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                          <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a4.5 4.5 0 0 0 4.5-4.5V6a4.5 4.5 0 0 0-9 0v8.25a4.5 4.5 0 0 0 4.5 4.5ZM12 18v3.75M9 22.5h6" />
                        </svg>
                    </button>

                    <button type="button" id="mute-button" class="bg-gray-800 hover:bg-gray-700 p-3 rounded-lg border border-green-600 transition-all is-muted">
                        <svg id="mute-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                            <path id="speaker-path" stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 010 12.728M16.463 8.288a5.25 5.25 0 010 7.424M6.75 8.25l4.72-4.72a.75.75 0 011.28.53v15.88a.75.75 0 01-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 012.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75z" />
                        </svg>
                    </button>

                    <input type="text" id="user-input" placeholder="ENTER COMMAND..." required class="flex-grow p-3 border border-green-600 bg-gray-900 text-green-400 rounded-lg focus:ring-green-400 focus:border-green-400 outline-none placeholder-green-800">
                    
                    <button type="submit" id="send-button" class="bg-green-600 hover:bg-green-700 text-black font-bold py-3 px-8 rounded-lg transition">
                        EXECUTE
                    </button>
                </form>
                <p id="error-message" class="text-red-500 text-xs mt-2 hidden font-bold uppercase tracking-tighter">System Alert: Uplink Error detected.</p>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="bg-gray-800 p-6 rounded-xl border border-red-600 w-full max-w-sm">
            <h3 class="text-xl font-bold text-red-500 mb-2">PURGE DATA?</h3>
            <p class="text-gray-400 mb-6">All local session history will be cleared.</p>
            <div class="flex justify-end space-x-3">
                <button id="modal-cancel" class="px-4 py-2 text-white hover:text-gray-300">CANCEL</button>
                <button id="modal-confirm" class="bg-red-600 px-4 py-2 text-white font-bold rounded hover:bg-red-700">DELETE</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, query, orderBy, onSnapshot, setDoc, updateDoc, arrayUnion, serverTimestamp, runTransaction, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        // --- Gemini Config ---
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025"; 
        const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'cyber-bot-default';

        let db = null;
        let auth = null;
        let userId = "local-user-" + Math.random().toString(36).substring(7);
        let currentSessionId = "session-" + Date.now();
        let isLoading = false;
        
        // --- Voice Logic ---
        let isMuted = true; 
        const synth = window.speechSynthesis;
        let preferredVoice = null;

        const ui = {
            chatWindow: document.getElementById('chat-window'),
            chatForm: document.getElementById('chat-form'),
            userInput: document.getElementById('user-input'),
            sendButton: document.getElementById('send-button'),
            errorMsg: document.getElementById('error-message'),
            micBtn: document.getElementById('mic-button'),
            muteBtn: document.getElementById('mute-button'),
            historyList: document.getElementById('history-list'),
            uidDisplay: document.getElementById('user-id-display'),
            modal: document.getElementById('confirmation-modal'),
            modalCancel: document.getElementById('modal-cancel'),
            modalConfirm: document.getElementById('modal-confirm'),
            deleteAllBtn: document.getElementById('delete-all-button')
        };

        function initVoices() {
            const voices = synth.getVoices();
            preferredVoice = voices.find(v => v.lang.startsWith('en-US') && v.name.includes('Male')) || 
                             voices.find(v => v.lang.startsWith('en-GB')) || 
                             voices.find(v => v.lang.startsWith('en')) ||
                             voices[0];
        }

        if (synth.onvoiceschanged !== undefined) {
            synth.onvoiceschanged = initVoices;
        }
        initVoices();

        function speak(text) {
            if (isMuted || !text) return;
            synth.cancel();
            const cleanText = text.replace(/[*_#`~>]/g, '').replace(/\[.*?\]/g, '').slice(0, 1000);
            const utterance = new SpeechSynthesisUtterance(cleanText);
            if (preferredVoice) utterance.voice = preferredVoice;
            utterance.pitch = 0.85; 
            utterance.rate = 1.0;
            utterance.volume = 1.0;
            const unlockUtterance = new SpeechSynthesisUtterance("");
            synth.speak(unlockUtterance);
            synth.speak(utterance);
        }

        function displayMessage(text, sender) {
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            const bubble = document.createElement('div');
            bubble.className = `p-3 rounded-xl max-w-[80%] border whitespace-pre-wrap text-sm ${
                sender === 'user' 
                ? 'bg-green-900/30 text-green-100 border-green-700 rounded-br-none' 
                : 'bg-gray-800 text-green-400 border-green-900/50 rounded-tl-none'
            }`;
            bubble.textContent = text;
            wrapper.appendChild(bubble);
            ui.chatWindow.appendChild(wrapper);
            ui.chatWindow.scrollTop = ui.chatWindow.scrollHeight;
        }

        async function callGemini(prompt, retries = 5, delay = 1000) {
            ui.errorMsg.classList.add('hidden');
            if (!apiKey || apiKey.trim() === "") {
                handleAIResponse("Sorry, I am currently unable to access my neural processors (API Key missing). Please configure your credentials to restore full system functionality.");
                return;
            }

            setLoading(true);
            showTyping();

            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: "You are a professional Cybersecurity AI. Provide brief, technical, and accurate answers." }] }
                        })
                    });

                    if (!response.ok) {
                        if (response.status === 401 || response.status === 403) throw new Error("AUTH_FAILED");
                        if (response.status === 429 && i < retries) {
                            await new Promise(r => setTimeout(r, delay));
                            delay *= 2; continue;
                        }
                        throw new Error(`Status: ${response.status}`);
                    }

                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text || "NO_RESPONSE";
                    handleAIResponse(aiText);
                    return;
                } catch (err) {
                    if (err.message === "AUTH_FAILED") {
                        handleAIResponse("Sorry, authentication failed. Please check your API key.");
                        return;
                    }
                    if (i === retries) {
                        removeTyping();
                        ui.errorMsg.classList.remove('hidden');
                        setLoading(false);
                    }
                }
            }
        }

        function handleAIResponse(text) {
            removeTyping();
            displayMessage(text, 'bot');
            saveMessage('bot', text);
            if (!isMuted) speak(text);
            setLoading(false);
        }

        async function saveMessage(sender, text) {
            if (!db || !userId) return; 
            const ref = doc(db, 'artifacts', appId, 'users', userId, 'cyber_chats', currentSessionId);
            try {
                await runTransaction(db, async (tx) => {
                    const snap = await tx.get(ref);
                    if (!snap.exists()) return;
                    tx.update(ref, { 
                        messages: arrayUnion({ sender, text, ts: Date.now() }), 
                        updatedAt: serverTimestamp() 
                    });
                });
            } catch (e) { /* silent fail for local mode */ }
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typing';
            div.className = 'flex justify-start';
            div.innerHTML = '<div class="bg-gray-800 p-3 rounded-xl flex border border-green-900/50"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            ui.chatWindow.appendChild(div);
            ui.chatWindow.scrollTop = ui.chatWindow.scrollHeight;
        }

        function removeTyping() { document.getElementById('typing')?.remove(); }

        function setLoading(state) {
            isLoading = state;
            ui.sendButton.disabled = state;
            ui.userInput.disabled = state;
        }

        function setupHistory() {
            if (!db || !userId) return;
            const q = query(collection(db, 'artifacts', appId, 'users', userId, 'cyber_chats'), orderBy("updatedAt", "desc"));
            onSnapshot(q, (snap) => {
                ui.historyList.innerHTML = '';
                snap.docs.forEach(d => {
                    const data = d.data();
                    const item = document.createElement('div');
                    item.className = `p-2 cursor-pointer rounded hover:bg-gray-700 text-xs truncate mb-1 border-l-2 ${d.id === currentSessionId ? 'bg-green-900/40 text-green-400 border-green-500' : 'text-gray-400 border-transparent'}`;
                    item.textContent = data.title || "Untitled Session";
                    item.onclick = () => {
                        currentSessionId = d.id;
                        ui.chatWindow.innerHTML = '';
                        data.messages?.forEach(m => displayMessage(m.text, m.sender));
                    };
                    ui.historyList.appendChild(item);
                });
            }, (error) => console.log("Cloud History disabled."));
        }

        async function createNewChat() {
            ui.chatWindow.innerHTML = '<div class="text-green-800 text-center text-[10px] py-4 uppercase tracking-widest opacity-50">--- NEW SESSION ---</div>';
            if (db && userId) {
                const ref = doc(collection(db, 'artifacts', appId, 'users', userId, 'cyber_chats'));
                await setDoc(ref, { title: "New Chat", messages: [], createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
                currentSessionId = ref.id;
            } else {
                currentSessionId = "local-" + Date.now();
            }
            setLoading(false);
        }

        async function purgeAllData() {
            if (db && userId) {
                const colRef = collection(db, 'artifacts', appId, 'users', userId, 'cyber_chats');
                const snap = await getDocs(colRef);
                const batch = writeBatch(db);
                snap.forEach(d => batch.delete(d.ref));
                await batch.commit();
            }
            ui.chatWindow.innerHTML = '';
            createNewChat();
            ui.modal.classList.add('hidden');
        }

        ui.deleteAllBtn.onclick = () => ui.modal.classList.remove('hidden');
        ui.modalCancel.onclick = () => ui.modal.classList.add('hidden');
        ui.modalConfirm.onclick = purgeAllData;

        const initApp = async () => {
            if (!firebaseConfig) {
                console.warn("Firebase config missing. Running in local mode.");
                return;
            }
            try {
                const firebaseApp = initializeApp(firebaseConfig);
                db = getFirestore(firebaseApp);
                auth = getAuth(firebaseApp);

                if (initialAuthToken) {
                    await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userId = user.uid;
                        ui.uidDisplay.textContent = userId.slice(0, 12) + "...";
                        setupHistory();
                    }
                });
            } catch (e) {
                console.error("Firebase Init Failed:", e);
            }
        };

        initApp();

        ui.chatForm.onsubmit = (e) => {
            e.preventDefault();
            const val = ui.userInput.value.trim();
            if (!val || isLoading) return;
            if (!isMuted && !synth.speaking) {
                const unlock = new SpeechSynthesisUtterance("");
                synth.speak(unlock);
            }
            displayMessage(val, 'user');
            saveMessage('user', val);
            ui.userInput.value = '';
            callGemini(val);
        };

        ui.muteBtn.onclick = () => {
            isMuted = !isMuted;
            if (isMuted) {
                synth.cancel();
                ui.muteBtn.classList.add('is-muted');
            } else {
                ui.muteBtn.classList.remove('is-muted');
                const prime = new SpeechSynthesisUtterance("");
                synth.speak(prime);
            }
        };

        document.getElementById('new-chat-button').onclick = createNewChat;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const rec = new SpeechRecognition();
            let isRecognizing = false;
            rec.onstart = () => { isRecognizing = true; ui.micBtn.classList.add('mic-active'); };
            rec.onend = () => { isRecognizing = false; ui.micBtn.classList.remove('mic-active'); };
            rec.onresult = (e) => { ui.userInput.value = e.results[0][0].transcript; ui.chatForm.requestSubmit(); };
            ui.micBtn.onclick = () => isRecognizing ? rec.stop() : rec.start();
        }
    </script>
</body>
</html>
